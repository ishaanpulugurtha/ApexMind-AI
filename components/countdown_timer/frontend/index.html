<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
    }
    .timer-shell {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      user-select: none;
    }
    .timer-label {
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .timer-value {
      font-size: 2.6rem;
      font-weight: 700;
      color: #38bdf8;
      font-variant-numeric: tabular-nums;
      transition: color 0.15s;
    }
    .timer-value.critical {
      color: #ef4444;
      animation: pulse 0.7s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.04); }
    }
    .timer-bar {
      margin-top: 0.75rem;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0284c7, #38bdf8);
      border-radius: 2px;
      transition: width 0.05s linear;
    }
    .timer-bar-fill.critical {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }
  </style>
</head>
<body>
  <div class="timer-shell">
    <div class="timer-label">Decision Window</div>
    <div class="timer-value" id="display">10.0</div>
    <div class="timer-bar">
      <div class="timer-bar-fill" id="bar" style="width:100%"></div>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const bar = document.getElementById("bar");

    let duration = 10;
    let resetKey = "0";
    let remaining = duration;
    let startTime = null;
    let frozen = false;
    let capturePending = false;
    let rafId = null;

    function send(payload) {
      if (window.Streamlit) {
        Streamlit.setComponentValue(payload);
      }
    }

    function render() {
      display.textContent = remaining.toFixed(1);
      const pct = (remaining / duration) * 100;
      bar.style.width = pct + "%";
      const critical = remaining <= 3;
      display.classList.toggle("critical", critical);
      bar.classList.toggle("critical", critical);
    }

    function tick(now) {
      if (startTime === null) startTime = now;
      const elapsed = (now - startTime) / 1000;
      remaining = Math.max(0, duration - elapsed);
      render();

      if (capturePending && !frozen) {
        capturePending = false;
        send({ event: "capture", time_remaining: remaining });
        rafId = requestAnimationFrame(tick);
        return;
      }

      if (remaining <= 0 && !frozen) {
        frozen = true;
        send({ event: "freeze", time_remaining: 0 });
        return;
      }

      if (!frozen) {
        rafId = requestAnimationFrame(tick);
      }
    }

    function startTimer() {
      if (rafId) cancelAnimationFrame(rafId);
      frozen = false;
      startTime = null;
      remaining = duration;
      render();
      rafId = requestAnimationFrame(tick);
    }

    function onRender(event) {
      const args = event.detail.args;
      duration = args.duration || 10;
      resetKey = args.reset_key || "0";
      capturePending = !!args.capture;

      if (!startTime || args._force_reset) {
        startTimer();
      } else if (capturePending) {
        // capture handled in tick loop
      }
    }

    // Track reset_key changes to restart timer per round
    let lastResetKey = null;

    function onRenderWrapper(event) {
      const args = event.detail.args;
      const newKey = args.reset_key || "0";
      if (lastResetKey !== null && lastResetKey !== newKey) {
        args._force_reset = true;
      }
      lastResetKey = newKey;
      onRender(event);
    }

    if (window.Streamlit) {
      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRenderWrapper);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(130);
    } else {
      startTimer();
    }
  </script>
</body>
</html>
